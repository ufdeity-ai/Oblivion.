<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidOS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #04000e; --core: #5b12d4; --pulse: #7c3aed;
  --flare: #a855f7; --pink: #e879f9; --white: #f0e8ff;
  --speed: #00f5c4; --danger: #f43f5e;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(168,85,247,0.18);
  --p1: 260; --p2: 290; --p3: 320;
  --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px;
  --bar-h: 54px;
}

/* ── THEMES ─────────────────────────────────────────────── */
body.t-normal { --void:#04000e;--core:#5b12d4;--pulse:#7c3aed;--flare:#a855f7;--pink:#e879f9;--speed:#00f5c4;--white:#f0e8ff;--glass:rgba(255,255,255,0.04);--glass-border:rgba(168,85,247,0.18);--p1:260;--p2:290;--p3:320 }
body.t-dark   { --void:#060606;--core:#1a1a2e;--pulse:#16213e;--flare:#e2e8f0;--pink:#94a3b8;--speed:#f8fafc;--white:#f8fafc;--glass:rgba(255,255,255,0.04);--glass-border:rgba(226,232,240,0.15);--p1:220;--p2:230;--p3:210 }
body.t-sky    { --void:#020c1b;--core:#0369a1;--pulse:#0284c7;--flare:#38bdf8;--pink:#7dd3fc;--speed:#34d399;--white:#e0f7ff;--glass:rgba(56,189,248,0.05);--glass-border:rgba(56,189,248,0.2);--p1:195;--p2:210;--p3:170 }
body.t-ember  { --void:#0d0400;--core:#c2410c;--pulse:#ea580c;--flare:#fb923c;--pink:#fbbf24;--speed:#fde68a;--white:#fff7ed;--glass:rgba(251,146,60,0.05);--glass-border:rgba(251,146,60,0.2);--p1:25;--p2:40;--p3:50 }
body.t-rose   { --void:#0d0008;--core:#9d174d;--pulse:#be185d;--flare:#ec4899;--pink:#f9a8d4;--speed:#fb7185;--white:#fdf2f8;--glass:rgba(236,72,153,0.05);--glass-border:rgba(236,72,153,0.2);--p1:320;--p2:340;--p3:350 }
body.t-forest { --void:#010c06;--core:#15803d;--pulse:#16a34a;--flare:#4ade80;--pink:#a3e635;--speed:#67e8f9;--white:#ecfdf5;--glass:rgba(74,222,128,0.05);--glass-border:rgba(74,222,128,0.2);--p1:140;--p2:120;--p3:165 }
body.t-crimson{ --void:#0d0000;--core:#b91c1c;--pulse:#dc2626;--flare:#f87171;--pink:#fca5a5;--speed:#fb923c;--white:#fff5f5;--glass:rgba(248,113,113,0.05);--glass-border:rgba(248,113,113,0.2);--p1:0;--p2:10;--p3:350 }
body.t-rainbow{ --void:#04000e;--core:#5b12d4;--pulse:#7c3aed;--flare:#a855f7;--pink:#e879f9;--speed:#00f5c4;--white:#f0e8ff;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.15);--p1:260;--p2:290;--p3:320 }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:var(--void);
  font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--white);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  user-select:none;
}

/* ── BACKGROUND LAYER ───────────────────────────────────── */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--void);transition:background 0.5s}
.blob{position:absolute;border-radius:50%;pointer-events:none}
.blob-1{width:900px;height:900px;background:radial-gradient(circle,var(--pulse) 0%,color-mix(in srgb,var(--pulse) 35%,transparent) 45%,transparent 70%);top:-300px;left:-200px;opacity:0.4;animation:blob1 22s ease-in-out infinite;filter:blur(4px)}
.blob-2{width:600px;height:600px;background:radial-gradient(circle,var(--flare) 0%,color-mix(in srgb,var(--flare) 30%,transparent) 50%,transparent 70%);bottom:-150px;right:-120px;opacity:0.32;animation:blob2 18s ease-in-out infinite;filter:blur(3px)}
.blob-3{width:420px;height:420px;background:radial-gradient(circle,var(--pink) 0%,transparent 70%);top:40%;left:58%;opacity:0.22;animation:blob3 26s ease-in-out infinite;filter:blur(3px)}
.blob-4{width:320px;height:320px;background:radial-gradient(circle,var(--speed) 0%,transparent 70%);top:18%;right:12%;opacity:0.14;animation:blob4 20s ease-in-out infinite;filter:blur(2px)}
.blob-5{width:550px;height:550px;background:radial-gradient(circle,var(--core) 0%,transparent 70%);bottom:18%;left:28%;opacity:0.28;animation:blob5 30s ease-in-out infinite;filter:blur(4px)}
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,80px) scale(1.08)}66%{transform:translate(-40px,40px) scale(0.95)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-80px,-60px) scale(1.1)}70%{transform:translate(30px,-30px) scale(0.92)}}
@keyframes blob3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,80px) scale(1.15)}}
@keyframes blob4{0%,100%{transform:translate(0,0) scale(1)}30%{transform:translate(-50px,40px) scale(1.2)}60%{transform:translate(40px,-20px) scale(0.85)}}
@keyframes blob5{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(80px,-50px) scale(1.05)}75%{transform:translate(-40px,60px) scale(0.9)}}

.grain{position:fixed;inset:-50%;z-index:1;pointer-events:none;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.03;animation:grainMove 4s steps(1) infinite}
@keyframes grainMove{0%{transform:translate(0,0)}10%{transform:translate(-1%,-2%)}20%{transform:translate(2%,1%)}30%{transform:translate(-2%,2%)}40%{transform:translate(1%,-1%)}50%{transform:translate(-1%,2%)}60%{transform:translate(2%,-2%)}70%{transform:translate(1%,1%)}80%{transform:translate(-2%,-1%)}90%{transform:translate(2%,2%)}100%{transform:translate(0,0)}}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 40%,rgba(0,0,0,0.5) 75%,rgba(0,0,0,0.85) 100%)}
#canvas{position:fixed;inset:0;z-index:3;pointer-events:none}

/* ── DESKTOP ─────────────────────────────────────────────── */
#desktop{position:fixed;inset:0;bottom:var(--bar-h);z-index:10;overflow:hidden}
.desktop-icons{position:absolute;top:20px;left:20px;display:flex;flex-direction:column;gap:6px;z-index:11}
.d-icon{width:80px;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;border-radius:var(--r-md);cursor:pointer;transition:background 0.15s;position:relative}
.d-icon:hover{background:rgba(255,255,255,0.07)}
.d-icon:active{background:rgba(255,255,255,0.12)}
.d-icon.selected{background:rgba(255,255,255,0.1)}
.d-icon-img{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:linear-gradient(160deg,rgba(255,255,255,0.1) 0%,rgba(0,0,0,0.3) 100%);border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 20px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.08) inset;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s}
.d-icon:hover .d-icon-img{transform:scale(1.1);box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 24px color-mix(in srgb,var(--flare) 40%,transparent),0 1px 0 rgba(255,255,255,0.12) inset}
.d-icon-label{font-size:0.68rem;font-weight:500;color:var(--white);text-shadow:0 1px 4px rgba(0,0,0,0.8),0 0 12px rgba(0,0,0,0.6);text-align:center;letter-spacing:0.02em;line-height:1.2}

/* ── WINDOW MANAGER ─────────────────────────────────────── */
.window{position:absolute;min-width:320px;min-height:200px;border-radius:var(--r-lg);overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,0.05) 0%,color-mix(in srgb,var(--void) 88%,black) 100%);
  border:1px solid var(--glass-border);
  border-top:1px solid rgba(255,255,255,0.12);
  box-shadow:0 32px 80px rgba(0,0,0,0.7),0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  backdrop-filter:blur(32px) saturate(1.5);
  -webkit-backdrop-filter:blur(32px) saturate(1.5);
  display:flex;flex-direction:column;
  transition:opacity 0.2s,transform 0.2s,box-shadow 0.2s;
  transform-origin:top center;
}
.window.minimizing{opacity:0;transform:scale(0.85) translateY(40px)}
.window.maximized{border-radius:0!important;border:none!important}
.window.focused{box-shadow:0 40px 100px rgba(0,0,0,0.8),0 8px 32px rgba(0,0,0,0.5),0 0 0 1px var(--glass-border),0 1px 0 rgba(255,255,255,0.08) inset}

.win-titlebar{height:40px;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,rgba(0,0,0,0.2) 100%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  cursor:default;flex-shrink:0;user-select:none}
.win-titlebar[data-draggable]{cursor:move}
.win-dots{display:flex;gap:7px;flex-shrink:0}
.win-dot{width:13px;height:13px;border-radius:50%;cursor:pointer;transition:filter 0.15s,transform 0.1s;border:1px solid rgba(0,0,0,0.2)}
.win-dot:hover{filter:brightness(1.3);transform:scale(1.15)}
.win-dot.close{background:#ff5f57}
.win-dot.min{background:#febc2e}
.win-dot.max{background:#28c840}
.win-app-icon{font-size:1rem;flex-shrink:0}
.win-title{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.7);letter-spacing:0.04em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.win-body{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}

/* Resize handle */
.win-resize{position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:se-resize;z-index:5;
  background:linear-gradient(135deg,transparent 50%,rgba(255,255,255,0.1) 50%);
  border-radius:0 0 var(--r-lg) 0}

/* ── TASKBAR ─────────────────────────────────────────────── */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:var(--bar-h);z-index:1000;
  display:flex;align-items:center;gap:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.75) 100%);
  backdrop-filter:blur(40px) saturate(1.6);
  -webkit-backdrop-filter:blur(40px) saturate(1.6);
  border-top:1px solid rgba(255,255,255,0.07);
  box-shadow:0 -1px 0 rgba(255,255,255,0.04) inset,0 -8px 32px rgba(0,0,0,0.3);
  padding:0 12px}

.tb-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-mid{flex:1;display:flex;align-items:center;gap:4px;overflow:hidden;padding:0 12px}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* VoidOS logo button */
.tb-logo{width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);cursor:pointer;
  background:linear-gradient(135deg,var(--core),var(--flare));
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 20px color-mix(in srgb,var(--core) 60%,transparent),0 1px 0 rgba(255,255,255,0.18) inset;
  font-family:'Orbitron',monospace;font-weight:900;font-size:0.65rem;color:white;
  letter-spacing:0.05em;transition:all 0.2s;user-select:none}
.tb-logo:hover{transform:scale(1.08);box-shadow:0 0 32px color-mix(in srgb,var(--core) 80%,transparent),0 1px 0 rgba(255,255,255,0.2) inset}
.tb-logo.active{background:linear-gradient(135deg,var(--flare),var(--pink));box-shadow:0 0 28px color-mix(in srgb,var(--flare) 70%,transparent)}

/* Taskbar divider */
.tb-sep{width:1px;height:28px;background:rgba(255,255,255,0.08);margin:0 4px;flex-shrink:0}

/* Pinned/running app buttons */
.tb-app{height:42px;min-width:42px;max-width:160px;
  display:flex;align-items:center;gap:8px;padding:0 10px;
  border-radius:var(--r-md);cursor:pointer;
  background:transparent;border:1px solid transparent;
  transition:all 0.18s;position:relative;flex-shrink:0}
.tb-app:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.08)}
.tb-app.running{background:rgba(255,255,255,0.06)}
.tb-app.active-win{background:color-mix(in srgb,var(--core) 20%,transparent);border-color:color-mix(in srgb,var(--flare) 30%,transparent)}
.tb-app-icon{font-size:1.2rem;flex-shrink:0}
.tb-app-label{font-size:0.72rem;font-weight:500;color:rgba(255,255,255,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-app-dot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--speed);box-shadow:0 0 6px var(--speed)}

/* Right tray */
.tb-tray-btn{height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 10px;border-radius:var(--r-md);cursor:pointer;
  transition:background 0.15s;gap:1px}
.tb-tray-btn:hover{background:rgba(255,255,255,0.07)}
.tb-clock-time{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:500;color:var(--white);letter-spacing:0.05em}
.tb-clock-date{font-size:0.6rem;color:rgba(255,255,255,0.45);letter-spacing:0.06em}
.tb-icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);cursor:pointer;font-size:1rem;
  color:rgba(255,255,255,0.55);transition:all 0.15s}
.tb-icon-btn:hover{background:rgba(255,255,255,0.07);color:var(--white)}
.tb-icon-btn.open{background:color-mix(in srgb,var(--core) 20%,transparent);color:var(--flare)}

/* ── START MENU ─────────────────────────────────────────── */
#start-menu{position:fixed;bottom:calc(var(--bar-h) + 8px);left:12px;width:340px;
  background:linear-gradient(160deg,rgba(255,255,255,0.05) 0%,color-mix(in srgb,var(--void) 92%,black) 100%);
  border:1px solid var(--glass-border);border-top:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r-lg);padding:20px;
  backdrop-filter:blur(40px) saturate(1.5);
  box-shadow:0 24px 64px rgba(0,0,0,0.7),0 1px 0 rgba(255,255,255,0.06) inset;
  z-index:2000;opacity:0;pointer-events:none;
  transform:translateY(10px) scale(0.97);
  transition:opacity 0.2s ease,transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
#start-menu.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.sm-title{font-family:'Orbitron',monospace;font-weight:900;font-size:1.1rem;
  background:linear-gradient(110deg,var(--flare),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:0.15em;margin-bottom:16px;text-align:center}
.sm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sm-app{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;
  border-radius:var(--r-md);cursor:pointer;
  background:linear-gradient(160deg,rgba(255,255,255,0.05) 0%,rgba(0,0,0,0.2) 100%);
  border:1px solid rgba(255,255,255,0.07);
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1)}
.sm-app:hover{background:color-mix(in srgb,var(--core) 18%,transparent);
  border-color:color-mix(in srgb,var(--flare) 35%,transparent);
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.sm-app-icon{font-size:1.8rem}
.sm-app-name{font-size:0.65rem;font-weight:600;color:rgba(255,255,255,0.7);text-align:center;letter-spacing:0.04em}
.sm-sep{height:1px;background:rgba(255,255,255,0.07);margin:0 -4px 12px}
.sm-footer{display:flex;justify-content:space-between;align-items:center}
.sm-user{display:flex;align-items:center;gap:10px}
.sm-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--core),var(--flare));
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;
  border:2px solid rgba(255,255,255,0.15)}
.sm-username{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.8)}
.sm-power{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--danger);font-size:1rem;border:1px solid rgba(244,63,94,0.2);
  transition:all 0.18s;background:rgba(244,63,94,0.05)}
.sm-power:hover{background:rgba(244,63,94,0.15);border-color:rgba(244,63,94,0.4)}

/* ── SYSTEM TRAY POPUPS ─────────────────────────────────── */
.tray-popup{position:fixed;bottom:calc(var(--bar-h) + 8px);right:12px;width:300px;
  background:linear-gradient(160deg,rgba(255,255,255,0.05) 0%,color-mix(in srgb,var(--void) 92%,black) 100%);
  border:1px solid var(--glass-border);border-top:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r-lg);padding:16px;
  backdrop-filter:blur(40px) saturate(1.5);
  box-shadow:0 24px 64px rgba(0,0,0,0.7),0 1px 0 rgba(255,255,255,0.06) inset;
  z-index:2000;opacity:0;pointer-events:none;
  transform:translateY(10px) scale(0.97);
  transition:opacity 0.2s ease,transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.tray-popup.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.tp-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;
  color:color-mix(in srgb,var(--flare) 55%,transparent);margin-bottom:10px;font-weight:600}
.tp-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.tp-row-label{font-size:0.78rem;color:rgba(255,255,255,0.65)}
.tp-slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;
  background:rgba(255,255,255,0.12);outline:none;cursor:pointer}
.tp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--flare);cursor:pointer;border:2px solid rgba(255,255,255,0.2);
  box-shadow:0 0 8px color-mix(in srgb,var(--flare) 60%,transparent)}
.tp-sep{height:1px;background:rgba(255,255,255,0.07);margin:12px 0}
.tp-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.tp-toggle-label{font-size:0.78rem;color:rgba(255,255,255,0.65);display:flex;align-items:center;gap:8px}
.tp-toggle{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.08);cursor:pointer;position:relative;transition:background 0.2s}
.tp-toggle.on{background:var(--core);border-color:var(--flare)}
.tp-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;
  border-radius:50%;background:white;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tp-toggle.on::after{transform:translateX(18px)}

/* ── NOTIFICATION ────────────────────────────────────────── */
.notif{position:fixed;top:20px;right:20px;min-width:280px;max-width:360px;
  background:linear-gradient(160deg,rgba(255,255,255,0.07) 0%,color-mix(in srgb,var(--void) 88%,black) 100%);
  border:1px solid var(--glass-border);border-top:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r-lg);padding:14px 16px;
  backdrop-filter:blur(32px);
  box-shadow:0 16px 48px rgba(0,0,0,0.6);
  z-index:5000;display:flex;align-items:flex-start;gap:12px;
  animation:notifIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes notifIn{from{opacity:0;transform:translateX(60px) scale(0.9)}to{opacity:1;transform:none}}
.notif-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.notif-title{font-size:0.8rem;font-weight:700;color:var(--white);margin-bottom:3px}
.notif-msg{font-size:0.72rem;color:rgba(255,255,255,0.55);line-height:1.4}
.notif-close{margin-left:auto;cursor:pointer;font-size:0.8rem;color:rgba(255,255,255,0.3);
  padding:2px 6px;border-radius:6px;transition:all 0.15s;flex-shrink:0}
.notif-close:hover{background:rgba(255,255,255,0.1);color:white}

    <div class="tp-toggle-label">✈️ Airplane Mode</div>
    <div class="tp-toggle" onclick="this.classList.toggle('on')"></div>
  </div>
</div>

<!-- Notifications popup -->
<div class="tray-popup" id="notif-tray" style="width:320px">
  <div class="tp-label">Notifications</div>
  <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.2);font-size:0.8rem">No new notifications</div>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="openApp('browser')">🌐 Open Browser</div>
  <div class="ctx-item" onclick="openApp('files')">📁 Open Files</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="openApp('settings')">⚙️ Display Settings</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="confirmShutdown()">⏻ Shut Down</div>
</div>

<!-- Boot screen -->
<div id="boot">
  <div class="boot-logo">VOID OS</div>
  <div class="boot-sub">Powered by Void Engine</div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
  <div class="boot-status" id="boot-status">Initializing kernel...</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  THEME SYSTEM
// ═══════════════════════════════════════════════════════════
const THEME_HUES = {
  normal:[260,290,320], dark:[220,230,210], sky:[195,210,170],
  ember:[25,40,50], rose:[320,340,350], forest:[140,120,165],
  crimson:[0,10,350], rainbow:[0,120,240]
};
const THEMES = Object.keys(THEME_HUES);
let currentTheme = localStorage.getItem('void-theme') || 'normal';

function setTheme(id) {
  THEMES.forEach(t => document.body.classList.remove('t-'+t));
  document.body.classList.add('t-'+id);
  currentTheme = id;
  localStorage.setItem('void-theme', id);
  updateParticleHues();
  // update settings UI
  document.querySelectorAll('.theme-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.theme === id);
  });
}

// ═══════════════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx2 = canvas.getContext('2d');
let W, H;
const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
addEventListener('resize', resize); resize();

function initHues() { return THEME_HUES[currentTheme] || [260,290,320]; }

const ptcls = Array.from({length:200}, () => {
  const h = initHues();
  return {x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    vx:(Math.random()-0.5)*0.35, vy:(Math.random()-0.5)*0.35,
    r:Math.random()*2+0.5, hue:h[0]+(Math.random()-0.5)*50,
    a:Math.random()*0.6+0.2, tw:Math.random()*Math.PI*2, tws:(Math.random()-0.5)*0.02, rainbowDrift:0};
});
const orbs = Array.from({length:12}, () => {
  const h = initHues();
  return {x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.15,
    r:Math.random()*40+20, hue:h[1]+(Math.random()-0.5)*30,
    a:Math.random()*0.12+0.04, tw:Math.random()*Math.PI*2, tws:(Math.random()-0.5)*0.01, rainbowDrift:0};
});
const streaks = Array.from({length:14}, ()=>newStreak());
function newStreak() {
  const h = initHues();
  return {x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    angle:Math.random()*Math.PI*2, speed:Math.random()*3+2,
    len:Math.random()*80+40, hue:h[2]+(Math.random()-0.5)*30,
    a:Math.random()*0.4+0.1, life:0, maxLife:Math.random()*80+40, rainbowDrift:0};
}

function updateParticleHues() {
  if (currentTheme==='rainbow') {
    ptcls.forEach((p,i) => { p.hue=(i/ptcls.length)*360; p.rainbowDrift=Math.random()*0.8+0.3; });
    orbs.forEach((o,i) => { o.hue=(i/orbs.length)*360; o.rainbowDrift=Math.random()*0.5+0.2; });
    streaks.forEach((s,i) => { s.hue=(i/streaks.length)*360; s.rainbowDrift=Math.random()*1.2+0.5; });
    return;
  }
  const hues = THEME_HUES[currentTheme]||[260,290,320];
  ptcls.forEach(p => { p.hue=hues[0]+(Math.random()-0.5)*40; p.rainbowDrift=0; });
  orbs.forEach(o => { o.hue=hues[1]+(Math.random()-0.5)*30; o.rainbowDrift=0; });
  streaks.forEach(s => { s.hue=hues[2]+(Math.random()-0.5)*30; s.rainbowDrift=0; });
}

let mx=W/2, my=H/2;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

function drawFrame() {
  ctx2.clearRect(0,0,W,H);
  // Orbs
  for (const o of orbs) {
    o.x+=o.vx; o.y+=o.vy; o.tw+=o.tws;
    if(o.rainbowDrift) o.hue=(o.hue+o.rainbowDrift)%360;
    if(o.x<-100)o.x=W+100; if(o.x>W+100)o.x=-100;
    if(o.y<-100)o.y=H+100; if(o.y>H+100)o.y=-100;
    const pulse=Math.sin(o.tw)*0.15+0.85;
    const g=ctx2.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*pulse*2);
    g.addColorStop(0,`hsla(${o.hue},100%,70%,${o.a})`);
    g.addColorStop(1,'transparent');
    ctx2.beginPath(); ctx2.arc(o.x,o.y,o.r*pulse*2,0,Math.PI*2);
    ctx2.fillStyle=g; ctx2.fill();
  }
  // Particles
  for (const p of ptcls) {
    p.x+=p.vx; p.y+=p.vy; p.tw+=p.tws;
    if(p.rainbowDrift) p.hue=(p.hue+p.rainbowDrift)%360;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    const dx=p.x-mx, dy=p.y-my, d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){p.x+=dx/d*0.8; p.y+=dy/d*0.8;}
    const tw=Math.sin(p.tw)*0.3+0.7;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,p.r*tw,0,Math.PI*2);
    ctx2.fillStyle=`hsla(${p.hue},100%,75%,${p.a*tw})`;
    ctx2.fill();
  }
  // Connection lines from mouse
  for (const p of ptcls) {
    const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);
    if(d<140){
      const g=ctx2.createLinearGradient(mx,my,p.x,p.y);
      g.addColorStop(0,`hsla(${p.hue},100%,75%,0.35)`);
      g.addColorStop(1,`hsla(${p.hue},100%,75%,0)`);
      ctx2.beginPath(); ctx2.moveTo(mx,my); ctx2.lineTo(p.x,p.y);
      ctx2.strokeStyle=g; ctx2.lineWidth=0.6; ctx2.stroke();
    }
  }
  // Streaks
  for (let i=0;i<streaks.length;i++) {
    const s=streaks[i];
    s.x+=Math.cos(s.angle)*s.speed; s.y+=Math.sin(s.angle)*s.speed; s.life++;
    if(s.rainbowDrift) s.hue=(s.hue+s.rainbowDrift)%360;
    if(s.life>s.maxLife || s.x<-200||s.x>W+200||s.y<-200||s.y>H+200) {
      streaks[i]=newStreak(); continue;
    }
    const prog=s.life/s.maxLife;
    const fade=prog<0.2?prog/0.2:prog>0.8?(1-prog)/0.2:1;
    const g=ctx2.createLinearGradient(s.x,s.y,s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);
    g.addColorStop(0,`hsla(${s.hue},100%,80%,${s.a*fade})`);
    g.addColorStop(1,'transparent');
    ctx2.beginPath(); ctx2.moveTo(s.x,s.y);
    ctx2.lineTo(s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);
    ctx2.strokeStyle=g; ctx2.lineWidth=1.5; ctx2.stroke();
  }
  requestAnimationFrame(drawFrame);
}

// ═══════════════════════════════════════════════════════════
//  APP DEFINITIONS
// ═══════════════════════════════════════════════════════════
const APPS = {
  browser: { name:'Oblivion', icon:'🌐', color:'#5b12d4',
    defaultSize:[820,560], minSize:[500,340], pinned:true },
  terminal:{ name:'Terminal', icon:'⬛', color:'#00f5c4',
    defaultSize:[600,400], minSize:[360,240], pinned:true },
  files:   { name:'Files',    icon:'📁', color:'#febc2e',
    defaultSize:[680,460], minSize:[400,280], pinned:true },
  notes:   { name:'Notes',    icon:'📝', color:'#ff9a00',
    defaultSize:[540,440], minSize:[320,240], pinned:false },
  settings:{ name:'Settings', icon:'⚙️', color:'#a855f7',
    defaultSize:[600,480], minSize:[400,300], pinned:false },
  clock:   { name:'Clock',    icon:'🕐', color:'#00e5ff',
    defaultSize:[320,340], minSize:[260,280], pinned:false },
};

// ═══════════════════════════════════════════════════════════
//  WINDOW MANAGER
// ═══════════════════════════════════════════════════════════
const wins = {}; // id -> {el, app, state:'normal'|'minimized'|'maximized', savedRect}
let zTop = 200;
let focusedId = null;

function genId() { return 'w' + Date.now() + Math.random().toString(36).slice(2,6); }

function openApp(appId) {
  // If already open, bring to front / restore
  const existing = Object.entries(wins).find(([,w]) => w.appId === appId);
  if (existing) {
    const [id, w] = existing;
    if (w.state === 'minimized') restoreWindow(id);
    focusWindow(id);
    closeAllPopups();
    return;
  }
  closeAllPopups();
  const app = APPS[appId];
  if (!app) return;

  const id = genId();
  const [dw, dh] = app.defaultSize;
  const [vw, vh] = [window.innerWidth, window.innerHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bar-h'))];

  const left = Math.max(60, (vw - dw) / 2 + Object.keys(wins).length * 22);
  const top  = Math.max(40, (vh - dh) / 2 + Object.keys(wins).length * 22);

  const el = document.createElement('div');
  el.className = 'window';
  el.id = id;
  el.style.cssText = `left:${left}px;top:${top}px;width:${dw}px;height:${dh}px;z-index:${++zTop};pointer-events:all`;

  el.innerHTML = `
    <div class="win-titlebar" data-draggable>
      <div class="win-dots">
        <div class="win-dot close" onclick="closeWindow('${id}')"></div>
        <div class="win-dot min"   onclick="minimizeWindow('${id}')"></div>
        <div class="win-dot max"   onclick="toggleMaximize('${id}')"></div>
      </div>
      <div class="win-app-icon">${app.icon}</div>
      <div class="win-title">${app.name}</div>
    </div>
    <div class="win-body" id="body-${id}">${buildAppContent(appId, id)}</div>
    <div class="win-resize" onmousedown="startResize(event,'${id}')"></div>
  `;

  document.getElementById('win-container').appendChild(el);
  wins[id] = { el, appId, state:'normal', savedRect:null };

  initDrag(el, el.querySelector('[data-draggable]'));
  el.addEventListener('mousedown', () => focusWindow(id));

  // Animate in
  el.style.opacity = '0';
  el.style.transform = 'scale(0.92) translateY(12px)';
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.2s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.opacity = '1';
    el.style.transform = '';
  });

  focusWindow(id);
  updateTaskbar();
  initAppLogic(appId, id);
}

function buildAppContent(appId, id) {
  switch (appId) {
    case 'browser': return buildBrowser(id);
    case 'terminal': return buildTerminal(id);
    case 'files': return buildFiles(id);
    case 'notes': return buildNotes(id);
    case 'settings': return buildSettings(id);
    case 'clock': return buildClock(id);
    default: return '<div style="padding:20px;color:rgba(255,255,255,0.4)">Coming soon</div>';
  }
}

function focusWindow(id) {
  if (!wins[id]) return;
  // Unfocus all
  Object.entries(wins).forEach(([wid, w]) => {
    w.el.classList.toggle('focused', wid === id);
  });
  wins[id].el.style.zIndex = ++zTop;
  focusedId = id;
  updateTaskbar();
}

function closeWindow(id) {
  if (!wins[id]) return;
  const el = wins[id].el;
  el.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
  el.style.opacity = '0';
  el.style.transform = 'scale(0.9) translateY(10px)';
  setTimeout(() => { el.remove(); delete wins[id]; updateTaskbar(); }, 150);
}

function minimizeWindow(id) {
  if (!wins[id]) return;
  const w = wins[id];
  w.el.classList.add('minimizing');
  setTimeout(() => {
    w.el.style.display = 'none';
    w.el.classList.remove('minimizing');
    w.state = 'minimized';
    updateTaskbar();
  }, 200);
}

function restoreWindow(id) {
  if (!wins[id]) return;
  const w = wins[id];
  if (w.state === 'minimized') {
    w.el.style.display = 'flex';
    w.state = 'normal';
    w.el.style.opacity = '0';
    w.el.style.transform = 'scale(0.9) translateY(10px)';
    requestAnimationFrame(() => {
      w.el.style.transition = 'opacity 0.2s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1)';
      w.el.style.opacity = '1';
      w.el.style.transform = '';
    });
  }
  if (w.state === 'maximized') {
    toggleMaximize(id);
  }
  focusWindow(id);
  updateTaskbar();
}

function toggleMaximize(id) {
  if (!wins[id]) return;
  const w = wins[id];
  const el = w.el;
  if (w.state === 'maximized') {
    // restore
    const r = w.savedRect;
    el.style.left = r.left+'px'; el.style.top = r.top+'px';
    el.style.width = r.width+'px'; el.style.height = r.height+'px';
    el.classList.remove('maximized');
    el.querySelector('.win-resize').style.display = '';
    w.state = 'normal';
  } else {
    w.savedRect = { left:parseInt(el.style.left), top:parseInt(el.style.top),
      width:parseInt(el.style.width), height:parseInt(el.style.height) };
    el.style.left='0'; el.style.top='0';
    el.style.width='100%';
    el.style.height = (window.innerHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bar-h'))) + 'px';
    el.classList.add('maximized');
    el.querySelector('.win-resize').style.display = 'none';
    w.state = 'maximized';
  }
}

// Drag
function initDrag(winEl, handle) {
  let dragging = false, ox, oy;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-dot')) return;
    if (wins[winEl.id]?.state === 'maximized') return;
    dragging = true;
    ox = e.clientX - winEl.offsetLeft;
    oy = e.clientY - winEl.offsetTop;
    document.body.style.cursor = 'move';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const bh = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bar-h'));
    winEl.style.left = Math.max(0, Math.min(window.innerWidth - 100, e.clientX - ox)) + 'px';
    winEl.style.top  = Math.max(0, Math.min(window.innerHeight - bh - 40, e.clientY - oy)) + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
  });
}

// Resize
function startResize(e, id) {
  e.preventDefault(); e.stopPropagation();
  const el = wins[id].el;
  const app = APPS[wins[id].appId];
  const [minW, minH] = app.minSize;
  const startW = parseInt(el.style.width);
  const startH = parseInt(el.style.height);
  const startX = e.clientX, startY = e.clientY;
  const onMove = ev => {
    el.style.width  = Math.max(minW, startW + ev.clientX - startX) + 'px';
    el.style.height = Math.max(minH, startH + ev.clientY - startY) + 'px';
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Taskbar
function updateTaskbar() {
  const mid = document.getElementById('tb-mid');
  mid.innerHTML = '';
  // Pinned apps
  Object.entries(APPS).filter(([,a]) => a.pinned).forEach(([appId, app]) => {
    const openWin = Object.entries(wins).find(([,w]) => w.appId === appId);
    const btn = document.createElement('div');
    btn.className = 'tb-app' + (openWin ? ' running' : '') + (openWin && openWin[0] === focusedId ? ' active-win' : '');
    btn.innerHTML = `<span class="tb-app-icon">${app.icon}</span><span class="tb-app-label">${app.name}</span>${openWin?'<div class="tb-app-dot"></div>':''}`;
    btn.onclick = () => {
      if (openWin) {
        if (wins[openWin[0]].state === 'minimized') restoreWindow(openWin[0]);
        else if (openWin[0] === focusedId) minimizeWindow(openWin[0]);
        else focusWindow(openWin[0]);
      } else openApp(appId);
    };
    mid.appendChild(btn);
  });
  // Non-pinned open windows
  Object.entries(wins).forEach(([wid, w]) => {
    if (APPS[w.appId]?.pinned) return;
    const app = APPS[w.appId];
    const btn = document.createElement('div');
    btn.className = 'tb-app running' + (wid === focusedId ? ' active-win' : '');
    btn.innerHTML = `<span class="tb-app-icon">${app.icon}</span><span class="tb-app-label">${app.name}</span><div class="tb-app-dot"></div>`;
    btn.onclick = () => {
      if (w.state === 'minimized') restoreWindow(wid);
      else if (wid === focusedId) minimizeWindow(wid);
      else focusWindow(wid);
    };
    mid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════
//  APP BUILDERS
// ═══════════════════════════════════════════════════════════
let tabCounter = 0;
const browserTabs = {}; // winId -> [{id,title,url,home}]

function buildBrowser(winId) {
  browserTabs[winId] = [{id:'t0',title:'New Tab',url:'',home:true}];
  return `
  <div class="browser-wrap" id="bw-${winId}">
    <div class="b-tabs" id="btabs-${winId}">
      <div class="b-tab active" id="tab-t0-${winId}">
        <span class="b-tab-icon">🏠</span>
        <span class="b-tab-title">New Tab</span>
        <span class="b-tab-x" onclick="closeBTab(event,'${winId}','t0')">✕</span>
      </div>
      <div class="b-plus" onclick="newBTab('${winId}')">＋</div>
    </div>
    <div class="browser-bar">
      <div class="b-nav-btn" onclick="bNav('${winId}','back')" title="Back">‹</div>
      <div class="b-nav-btn" onclick="bNav('${winId}','fwd')" title="Forward">›</div>
      <div class="b-nav-btn" onclick="bNav('${winId}','refresh')" title="Refresh">↺</div>
      <div class="b-addr-wrap">
        <span class="b-lock">🔒</span>
        <input class="b-addr" id="baddr-${winId}" placeholder="Search or enter URL..." 
          onkeydown="if(event.key==='Enter')bGo('${winId}')">
      </div>
      <button class="b-go" onclick="bGo('${winId}')">GO</button>
    </div>
    <div class="b-viewport" id="bvp-${winId}">
      <div class="b-home" id="bhome-${winId}">
        <div class="b-home-logo">OBLIVION</div>
        <div style="font-size:0.7rem;letter-spacing:0.22em;color:rgba(255,255,255,0.3);text-transform:uppercase;font-family:'DM Mono',monospace">Void Engine — Custom Built</div>
        <div class="b-search-row">
          <input class="b-search" id="bsearch-${winId}" placeholder="Search the web or enter URL..."
            onkeydown="if(event.key==='Enter'){document.getElementById('baddr-${winId}').value=this.value;bGo('${winId}')}">
        </div>
        <div class="b-ql">
          ${[['🔍','Google','https://google.com'],['📺','YouTube','https://youtube.com'],
             ['💬','Reddit','https://reddit.com'],['🐙','GitHub','https://github.com'],
             ['🎮','Twitch','https://twitch.tv'],['🐦','Twitter','https://x.com'],
             ['📚','Wiki','https://wikipedia.org'],['🤖','Claude','https://claude.ai']]
            .map(([ico,label,url])=>`<div class="b-ql-item" onclick="bNavTo('${winId}','${url}')"><span>${ico}</span><span class="b-ql-label">${label}</span></div>`).join('')}
        </div>
      </div>
      <iframe class="b-iframe" id="biframe-${winId}" style="display:none" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>
    </div>
  </div>`;
}

function bNavTo(winId, url) {
  document.getElementById('baddr-'+winId).value = url;
  bGo(winId);
}

function bGo(winId) {
  let raw = document.getElementById('baddr-'+winId).value.trim() ||
            document.getElementById('bsearch-'+winId)?.value.trim() || '';
  if (!raw) return;
  let url;
  if (/^https?:\/\//i.test(raw)) url = raw;
  else if (/^[\w-]+\.[a-z]{2,}/.test(raw)) url = 'https://'+raw;
  else {
    const engine = localStorage.getItem('void-engine') || 'google';
    const engines = {google:'https://www.google.com/search?q=',brave:'https://search.brave.com/search?q=',startpage:'https://www.startpage.com/search?q='};
    url = (engines[engine]||engines.google) + encodeURIComponent(raw);
  }
  const iframe = document.getElementById('biframe-'+winId);
  const home   = document.getElementById('bhome-'+winId);
  home.style.display = 'none';
  iframe.style.display = 'block';
  iframe.src = '/proxy?url=' + encodeURIComponent(url);
  document.getElementById('baddr-'+winId).value = url;
  // update tab title
  setActiveTabTitle(winId, new URL(url).hostname.replace('www.',''));
  // update window title
  const w = Object.values(wins).find(w => w.appId === 'browser');
  if (w) {
    w.el.querySelector('.win-title').textContent = 'Oblivion — ' + new URL(url).hostname.replace('www.','');
  }
}

function setActiveTabTitle(winId, title) {
  const activeTab = document.querySelector(`#btabs-${winId} .b-tab.active .b-tab-title`);
  if (activeTab) activeTab.textContent = title;
}

function bNav(winId, dir) {
  const iframe = document.getElementById('biframe-'+winId);
  if (dir==='back') iframe.contentWindow?.history.back();
  else if (dir==='fwd') iframe.contentWindow?.history.forward();
  else if (dir==='refresh') iframe.contentWindow?.location.reload();
}

function newBTab(winId) {
  const id = 't'+tabCounter++;
  browserTabs[winId].push({id,title:'New Tab',url:'',home:true});
  const tabsEl = document.getElementById('btabs-'+winId);
  const plus = tabsEl.querySelector('.b-plus');
  const tab = document.createElement('div');
  tab.className = 'b-tab';
  tab.id = 'tab-'+id+'-'+winId;
  tab.innerHTML = `<span>🏠</span><span class="b-tab-title">New Tab</span><span class="b-tab-x" onclick="closeBTab(event,'${winId}','${id}')">✕</span>`;
  tab.onclick = () => switchBTab(winId, id);
  tabsEl.insertBefore(tab, plus);
  switchBTab(winId, id);
}

function switchBTab(winId, tabId) {
  document.querySelectorAll(`#btabs-${winId} .b-tab`).forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tabId+'-'+winId)?.classList.add('active');
  // For now show home on tab switch (full tab state management would be elaborate)
  document.getElementById('biframe-'+winId).style.display = 'none';
  document.getElementById('bhome-'+winId).style.display = 'flex';
  document.getElementById('baddr-'+winId).value = '';
}

function closeBTab(e, winId, tabId) {
  e.stopPropagation();
  const tabs = browserTabs[winId];
  if (tabs.length <= 1) { closeWindow(Object.keys(wins).find(k => wins[k].appId==='browser')); return; }
  document.getElementById('tab-'+tabId+'-'+winId)?.remove();
  const i = tabs.findIndex(t=>t.id===tabId);
  tabs.splice(i,1);
  switchBTab(winId, tabs[Math.max(0,i-1)].id);
}

// Listen for proxy navigation messages
window.addEventListener('message', e => {
  if (e.data?.type === 'oblivion-navigate' || e.data?.type === 'oblivion-url') {
    const url = e.data.url;
    if (!url) return;
    // Find which browser window's iframe sent this
    Object.entries(wins).forEach(([wid, w]) => {
      if (w.appId !== 'browser') return;
      const iframe = document.getElementById('biframe-'+wid);
      if (!iframe) return;
      if (e.data.type === 'oblivion-navigate') {
        iframe.src = '/proxy?url=' + encodeURIComponent(url);
      }
      document.getElementById('baddr-'+wid).value = url;
      setActiveTabTitle(wid, new URL(url).hostname.replace('www.',''));
    });
  }
});

const termHistory = {}; // winId -> string[]
const termHistIdx = {};

function termKey(e, id) {
  if (!termHistory[id]) { termHistory[id]=[]; termHistIdx[id]=-1; }
  const input = document.getElementById('term-in-'+id);
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    if (!cmd) return;
    termHistory[id].unshift(cmd); termHistIdx[id]=-1;
    const out = document.getElementById('term-out-'+id);
    out.innerHTML += `<div class="term-line"><span class="term-prompt">void@voidOS:~$ </span><span class="term-cmd">${cmd}</span></div>`;
    const parts = cmd.split(' ');
    const base = parts[0];
    const args = parts.slice(1);
    let result;
    if (base === 'clear') { TERM_CMDS.clear(out); out.innerHTML = ''; result=null; }
    else if (base === 'theme' && args[0]) { setTheme(args[0]); result = 'Theme set: '+args[0]; }
    else if (base === 'open' && args[0]) { openApp(args[0]); result = 'Opening '+args[0]+'...'; }
    else if (TERM_CMDS[cmd]) result = TERM_CMDS[cmd](out, args);
    else if (TERM_CMDS[base]) result = TERM_CMDS[base](out, args);
    else result = `<span class="term-err">Command not found: ${cmd}</span>`;
    if (result !== null && result !== undefined) {
      out.innerHTML += `<div class="term-line term-out">${result.replace(/\n/g,'<br>')}</div>`;
    }
    out.innerHTML += `<div class="term-line"> </div>`;
    out.scrollTop = out.scrollHeight;
    input.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (termHistIdx[id] < termHistory[id].length-1) {
      termHistIdx[id]++;
      input.value = termHistory[id][termHistIdx[id]];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (termHistIdx[id] > 0) { termHistIdx[id]--; input.value = termHistory[id][termHistIdx[id]]; }
    else { termHistIdx[id]=-1; input.value=''; }
  }
}

// Clock hands update
function updateClockHands(winId) {
  const el = document.getElementById('aclock-'+winId);
  if (!el) return;
  const now = new Date();
  const s = now.getSeconds() + now.getMilliseconds()/1000;
  const m = now.getMinutes() + s/60;
  const h = (now.getHours()%12) + m/60;
  const hAngle = (h/12)*360-90;
  const mAngle = (m/60)*360-90;
  const sAngle = (s/60)*360-90;
  const hand = (id, angle, len) => {
    const a = (angle*Math.PI)/180;
    const hEl = document.getElementById(id);
    if (hEl) { hEl.setAttribute('x2', 90+Math.cos(a)*len); hEl.setAttribute('y2', 90+Math.sin(a)*len); }
  };
  hand('ch-'+winId, hAngle, 32);
  hand('cm-'+winId, mAngle, 45);
  hand('cs-'+winId, sAngle, 52);
  document.getElementById('dtime-'+winId).textContent = now.toLocaleTimeString();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('ddate-'+winId).textContent = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('dday-'+winId).textContent = days[now.getDay()];
  setTimeout(() => updateClockHands(winId), 100);
}

let openPopup = null;

function toggleStartMenu() {
  const sm = document.getElementById('start-menu');
  const logo = document.getElementById('tb-logo');
  if (sm.classList.contains('open')) {
    sm.classList.remove('open');
    logo.classList.remove('active');
    openPopup = null;
  } else {
    closeAllPopups();
    sm.classList.add('open');
    logo.classList.add('active');
    openPopup = 'start-menu';
  }
}

function toggleTrayPopup(id) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    openPopup = null;
  } else {
    closeAllPopups();
    el.classList.add('open');
    openPopup = id;
  }
}

function closeAllPopups() {
  document.getElementById('start-menu').classList.remove('open');
  document.getElementById('tb-logo').classList.remove('active');
  document.querySelectorAll('.tray-popup').forEach(p => p.classList.remove('open'));
  document.getElementById('ctx-menu').classList.remove('open');
  openPopup = null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#start-menu') && !e.target.closest('#tb-logo') &&
      !e.target.closest('.tray-popup') && !e.target.closest('.tb-icon-btn') &&
      !e.target.closest('.tb-tray-btn')) {
    closeAllPopups();
  }
  if (!e.target.closest('#ctx-menu')) {
    document.getElementById('ctx-menu').classList.remove('open');
  }
});

  ctx.style.top  = Math.min(e.clientY, window.innerHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bar-h')) - 160) + 'px';

});
